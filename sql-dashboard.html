<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinook DB — SQL 학습 대시보드</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#efede8;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --text:#1a1a18;--text2:#5f5e5a;--text3:#999890;
  --accent:#185FA5;--accent-bg:#e6f1fb;--accent-text:#0C447C;
  --success:#0F6E56;--success-bg:#e1f5ee;
  --warn:#854F0B;--warn-bg:#FAEEDA;
  --code-bg:#1a1b26;--code-text:#c0caf5;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#28282a;--bg3:#323234;
    --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
    --text:#f0ede6;--text2:#a8a5a0;--text3:#6a6864;
    --accent:#85B7EB;--accent-bg:#042C53;--accent-text:#B5D4F4;
    --success:#5DCAA5;--success-bg:#04342C;
    --warn:#EF9F27;--warn-bg:#412402;
    --code-bg:#11111b;
  }
}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg2);color:var(--text);font-size:14px;line-height:1.6}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;color:var(--text2)}
.spinner{width:36px;height:36px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-label{font-size:15px;font-weight:500;color:var(--text)}
.load-sub{font-size:12px;color:var(--text3)}
#app{display:none}

/* ── Header ── */
header{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200}
.logo{width:34px;height:34px;background:var(--accent-bg);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.h-title{font-size:15px;font-weight:600}
.h-sub{font-size:11px;color:var(--text3)}
.h-badges{margin-left:auto;display:flex;gap:8px;align-items:center}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--text2);white-space:nowrap}
.badge.green{background:var(--success-bg);color:var(--success);border-color:transparent}
.badge.blue{background:var(--accent-bg);color:var(--accent-text);border-color:transparent}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 58px)}

/* ── Sidebar ── */
.sidebar{background:var(--bg);border-right:1px solid var(--border);padding:20px 0 40px;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto}
.sb-section{margin-bottom:28px}
.sb-label{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);padding:0 18px 10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 18px;cursor:pointer;color:var(--text2);font-size:13px;border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent-text);border-left-color:var(--accent);font-weight:500}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.schema-row{padding:4px 18px 4px 28px;font-size:11px;font-family:'SF Mono','Fira Code',monospace;color:var(--text3);display:flex;justify-content:space-between}
.schema-row span{color:var(--text2)}

/* ── Main ── */
main{padding:28px 28px 60px;overflow-y:auto}
.page-header{margin-bottom:24px}
.page-header h1{font-size:21px;font-weight:700;margin-bottom:6px}
.page-header p{color:var(--text2);font-size:13px;max-width:680px;line-height:1.7}
.page-header p strong{color:var(--accent-text)}

/* ── Stat Cards ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px}

/* ── Analysis Cards ── */
.analysis-card{background:var(--bg);border:1px solid var(--border);border-radius:14px;margin-bottom:24px;overflow:hidden}
.card-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px}
.card-num{width:28px;height:28px;border-radius:7px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.card-title{font-size:15px;font-weight:600;margin-bottom:3px}
.card-desc{font-size:12px;color:var(--text2);line-height:1.5}
.card-type{margin-left:auto;font-size:11px;padding:4px 10px;border-radius:6px;background:var(--bg3);color:var(--text2);white-space:nowrap;flex-shrink:0}

/* ── SQL Toggle ── */
.sql-toggle{display:flex;align-items:center;gap:8px;padding:10px 22px;cursor:pointer;font-size:12px;color:var(--text2);background:var(--bg2);border-bottom:1px solid var(--border);user-select:none;transition:background .15s}
.sql-toggle:hover{background:var(--bg3)}
.sql-toggle .arrow{font-size:9px;transition:transform .2s;color:var(--text3)}
.sql-toggle.open .arrow{transform:rotate(90deg)}
.sql-toggle .sql-label{font-weight:500}
.sql-toggle .row-count{margin-left:auto;font-size:11px;color:var(--text3)}

/* ── Code Block ── */
.sql-block{display:none;background:var(--code-bg);border-bottom:1px solid var(--border)}
.sql-block.show{display:block}
.sql-inner{padding:18px 22px;overflow-x:auto}
.sql-inner pre{font-family:'SF Mono','Fira Code','Cascadia Code',monospace;font-size:12.5px;line-height:1.8;color:var(--code-text);white-space:pre}
.kw{color:#89b4fa;font-weight:600}
.fn2{color:#a6e3a1}
.num{color:#fab387}
.str2{color:#f38ba8}
.cmt2{color:#565f89;font-style:italic}
.al{color:#cba6f7}

/* ── Card Body ── */
.card-body{padding:22px}
.card-body.no-pad{padding:0}
canvas{max-height:300px}

/* ── Result Table ── */
.tbl-wrap{overflow-x:auto}
table.rt{width:100%;border-collapse:collapse;font-size:13px}
table.rt th{background:var(--bg2);padding:10px 16px;text-align:left;font-weight:500;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
table.rt td{padding:11px 16px;border-bottom:1px solid var(--border);color:var(--text)}
table.rt tr:last-child td{border-bottom:none}
table.rt tr:hover td{background:var(--bg2)}
.ncell{text-align:right;font-family:'SF Mono','Fira Code',monospace;font-size:12px;font-variant-numeric:tabular-nums}
.rank{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:700;background:var(--bg3);color:var(--text2)}
.rank.g{background:#FAEEDA;color:#BA7517}
.rank.s{background:#f0f0ee;color:#5F5E5A}
.rank.b{background:#FAECE7;color:#993C1D}
.bar-cell{display:flex;align-items:center;gap:10px}
.mini-bar{height:6px;border-radius:3px;min-width:4px;flex-shrink:0}
@media(max-width:768px){.layout{grid-template-columns:1fr}.sidebar{display:none}.stats-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

  desc:'각 음악 장르에 포함된 트랙(곡)의 수를 비교합니다. GROUP BY와 COUNT()의 기본 사용 예시입니다.',
  type:'Bar Chart',
  sqlHtml:`<span class="cmt2">-- 장르별 트랙 수 집계 (GROUP BY + COUNT)</span>
<span class="kw">SELECT</span>
  g.Name              <span class="kw">AS</span> <span class="al">장르</span>,
  <span class="fn2">COUNT</span>(t.TrackId)   <span class="kw">AS</span> <span class="al">트랙수</span>

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function mkCanvas(parent, h='280px'){
  const c=document.createElement('canvas');
  c.style.maxHeight=h;
  parent.appendChild(c);
  return c;
}
function runQ(db, sql){
  try{const r=db.exec(sql);return r.length?r[0].values:[];}
  catch(e){console.warn(e);return [];}
}

// ═══════════════════════════════════════════════════════════
//  BUILD UI
// ═══════════════════════════════════════════════════════════
function buildStats(db){
  const defs=[
    {label:'총 트랙 수', q:'SELECT COUNT(*) FROM tracks', suf:'곡', col:'#378ADD'},
    {label:'총 아티스트', q:'SELECT COUNT(*) FROM artists', suf:'명', col:'#1D9E75'},
    {label:'등록 고객', q:'SELECT COUNT(*) FROM customers', suf:'명', col:'#D4537E'},
    {label:'총 매출',   q:'SELECT ROUND(SUM(Total),2) FROM invoices', pre:'$', col:'#BA7517'}
  ];
  const row=document.getElementById('stats-row');
  defs.forEach(d=>{
    const v=runQ(db,d.q)[0]?.[0]??'—';
    const card=document.createElement('div');
    card.className='stat-card';
    card.innerHTML=`<div class="stat-label">${d.label}</div>
      <div class="stat-value" style="color:${d.col}">${d.pre||''}${v}${d.suf||''}</div>`;
    row.appendChild(card);
  });
}

function buildSchema(db){
  const tables=[
    {name:'genres',q:'SELECT COUNT(*) FROM genres'},
    {name:'artists',q:'SELECT COUNT(*) FROM artists'},
    {name:'albums',q:'SELECT COUNT(*) FROM albums'},
    {name:'tracks',q:'SELECT COUNT(*) FROM tracks'},
    {name:'customers',q:'SELECT COUNT(*) FROM customers'},
    {name:'invoices',q:'SELECT COUNT(*) FROM invoices'},
    {name:'invoice_items',q:'SELECT COUNT(*) FROM invoice_items'}
  ];
  const list=document.getElementById('schema-list');
  tables.forEach(t=>{
    const cnt=runQ(db,t.q)[0]?.[0]??0;
    const el=document.createElement('div');el.className='schema-row';
    el.innerHTML=`<span>${t.name}</span><span>${cnt}행</span>`;
    list.appendChild(el);
  });
}

function buildNav(){
  const nav=document.getElementById('nav-items');
  ANALYSES.forEach((a,i)=>{
    const el=document.createElement('div');
    el.className='nav-item'+(i===0?' active':'');
    el.dataset.id=a.id;
    el.innerHTML=`<span class="nav-dot" style="background:${a.color}"></span>${a.num}. ${a.title}`;
    el.onclick=()=>{
      document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('card-'+a.id)?.scrollIntoView({behavior:'smooth',block:'start'});
    };
    nav.appendChild(el);
  });
}

function buildCard(db, a){
  const rows=runQ(db,a.query);
  const card=document.createElement('div');
  card.className='analysis-card';
  card.id='card-'+a.id;
  card.innerHTML=`
    <div class="card-header">
      <div class="card-num" style="background:${a.color}22;color:${a.color}">${a.num}</div>
      <div style="flex:1">
        <div class="card-title">${a.title}</div>
        <div class="card-desc">${a.desc}</div>
      </div>
      <span class="card-type">${a.type}</span>
    </div>
    <div class="sql-toggle" id="tog-${a.id}">
      <span class="arrow">▶</span>
      <span class="sql-label">SQL 쿼리 보기</span>
      <span class="row-count">${rows.length}개 행 반환됨</span>
    </div>
    <div class="sql-block" id="sqb-${a.id}">
      <div class="sql-inner"><pre>${a.sqlHtml}</pre></div>
    </div>
    <div class="card-body" id="bod-${a.id}"></div>`;

  const tog=card.querySelector('#tog-'+a.id);
  const sqb=card.querySelector('#sqb-'+a.id);
  tog.onclick=()=>{
    const open=sqb.classList.toggle('show');
    tog.classList.toggle('open',open);
    tog.querySelector('.sql-label').textContent=open?'SQL 쿼리 숨기기':'SQL 쿼리 보기';
  };

  a.render(rows, card.querySelector('#bod-'+a.id));
  return card;
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
(async()=>{
  try{
    const SQL=await initSqlJs({
      locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`
    });
    const db=new SQL.Database();
    db.run(SCHEMA);
    GENRES.forEach(r=>db.run('INSERT INTO genres VALUES(?,?)',r));
    ARTISTS.forEach(r=>db.run('INSERT INTO artists VALUES(?,?)',r));
    ALBUMS.forEach(r=>db.run('INSERT INTO albums VALUES(?,?,?)',r));
    TRACKS.forEach(r=>db.run('INSERT INTO tracks VALUES(?,?,?,?,?,?)',r));
    CUSTOMERS.forEach(r=>db.run('INSERT INTO customers VALUES(?,?,?,?,?)',r));
    const validC=new Set(CUSTOMERS.map(c=>c[0]));
    INVOICES.filter(r=>validC.has(r[1])).forEach(r=>db.run('INSERT INTO invoices VALUES(?,?,?,?)',r));
    const validT=new Set(TRACKS.map(t=>t[0]));
    INV_ITEMS.filter(r=>validT.has(r[2])).forEach(r=>db.run('INSERT INTO invoice_items VALUES(?,?,?,?,?)',r));

    buildStats(db);
    buildSchema(db);
    buildNav();
    const cont=document.getElementById('analyses');
    ANALYSES.forEach(a=>cont.appendChild(buildCard(db,a)));

    const tc=runQ(db,'SELECT COUNT(*) FROM tracks')[0][0];
    document.getElementById('hdr-count').textContent=`트랙 ${tc}개 로드됨`;
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';

  }catch(e){
    document.getElementById('loading').innerHTML=`
      <div style="color:#E24B4A;font-size:16px">⚠ 로딩 오류</div>
      <div style="font-size:12px;opacity:.7;max-width:400px;text-align:center">${e.message}</div>`;
    console.error(e);
  }
})();
</script>
